baseURL = "https://hologramdoc.github.io/engineering-notes/"
languageCode = "ko-KR"
title = "Vision AI Lab"
theme = "PaperMod"
[pagination]
  pagerSize = 10
enableRobotsTXT = true
buildDrafts = false

[params]
  env = "production"
  title = "Vision AI Lab"
  description = "제조 AI 추론 엔진 · Edge 배포 · MLOps · LCD 광학설계 — 현장 엔지니어링 실무 노트"
  author = "ho93"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false
    linkFullImages = true

  [params.homeInfoParams]
    Title = "Vision AI Lab"
    Content = """
제조 현장 AI 시스템 엔지니어링 실무 노트.

TensorRT 추론 최적화부터 Edge 배포, MLOps 운영, LCD 광학설계까지 —
라인이 멈추지 않도록 시스템을 설계하고 운영한 경험을 기록합니다.

`TensorRT` `ONNX` `YOLOv8` `Prometheus` `Jetson AGX Orin` `Mura/Demura`
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/hologramdoc"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:hyunho7992@gmail.com"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30

[taxonomies]
  tag = "tags"
  category = "categories"

[markup.highlight]
  noClasses = false
  anchorLineNos = true
  codeFences = true
  guessSyntax = true
  lineNos = true
  style = "monokai"
