baseURL = "https://hologramdoc.github.io/engineering-notes/"
languageCode = "ko-KR"
title = "Vision AI Lab"
theme = "hugo-theme-stack"
enableRobotsTXT = true
buildDrafts = false
hasCJKLanguage = true
defaultContentLanguage = "ko"

[pagination]
  pagerSize = 10

[params]
  mainSections = ["posts"]
  rssFullContent = true

  [params.sidebar]
    compact = false
    avatar   = "https://avatars.githubusercontent.com/hologramdoc"
    subtitle = "제조 AI · Edge · MLOps"

  [params.article]
    toc = true
    readingTime = true
    headingAnchor = true

    [params.article.list]
      showTags = true

    [params.article.license]
      enabled = false

  [params.footer]
    since = 2025
    customText = "Vision AI Lab — 현장 엔지니어링 실무 노트"

  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02"

  [params.colorScheme]
    toggle = true
    default = "auto"

  [params.comments]
    enabled = false

  [params.widgets]
    homepage = ["search", "archives", "tag-cloud"]
    page = ["toc"]

  [params.imageProcessing]
    autoOrient = false

    [params.imageProcessing.external]
      timeout = "5s"

    [params.imageProcessing.content]
      enabled = true
      widths = [800, 1600]

    [params.imageProcessing.thumbnail]
      enabled = true

[markup.highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNos = true
  style = "monokai"

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
    [menu.main.params]
      icon = "archives"

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
    [menu.main.params]
      icon = "tag"

  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 30
    [menu.main.params]
      icon = "category"

  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 40
    [menu.main.params]
      icon = "date"

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 50
    [menu.main.params]
      icon = "user"

  [[menu.social]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/hologramdoc"
    weight = 1
    [menu.social.params]
      icon = "brand-github"

  [[menu.social]]
    identifier = "email"
    name = "Email"
    url = "mailto:hyunho7992@gmail.com"
    weight = 2
    [menu.social.params]
      icon = "mail"
